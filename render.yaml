# Blueprint Render: ajusta el nombre del servicio y define los secretos en el dashboard.
# Documentación: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: flytrack-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # Patrones CORS separados por coma, p. ej. https://tu-app.vercel.app,https://*.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # Opcional: misma URL base del servicio (https://flytrack-api.onrender.com) para Swagger
      - key: OPENAPI_PUBLIC_URL
        sync: false
