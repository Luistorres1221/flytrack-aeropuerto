# Render / producción: MySQL (Railway) vía variables de entorno
server.port=${PORT:8080}
# HTTPS y host detrás del proxy de Render
server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=25s

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Primera subida: update crea/ajusta tablas desde las entidades. Para endurecer: validate + Flyway.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Pool acotado (Railway / instancias pequeñas en Render)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.sql.init.mode=never
spring.h2.console.enabled=false

# Orígenes CORS: dominio de Vercel. Incluye https://*.vercel.app para previews si lo necesitas.
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:https://*.vercel.app}

# Opcional: URL pública de la API para Swagger (sin barra final). Si no se define, usa host relativo.
app.openapi.public-url=${OPENAPI_PUBLIC_URL:}

# Health check para Render
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

logging.level.root=INFO
logging.level.org.springframework.web=INFO
