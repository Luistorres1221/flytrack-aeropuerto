# Arranque de contexto tipo producción: H2 en modo MySQL + dialecto MySQL (sin data.sql).
spring.datasource.url=jdbc:h2:mem:flytrack_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
spring.h2.console.enabled=false
spring.jpa.open-in-view=false

server.port=0

app.cors.allowed-origin-patterns=http://localhost:*
app.openapi.public-url=

management.endpoints.web.exposure.include=health
