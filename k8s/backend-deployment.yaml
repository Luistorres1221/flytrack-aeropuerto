apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: aeropuerto-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://mysql-service:3306/aeropuerto_db
        - name: SPRING_DATASOURCE_USERNAME
          value: aeropuerto_user
        - name: SPRING_DATASOURCE_PASSWORD
          value: securepassword